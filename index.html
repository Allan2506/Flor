<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flores Amarillas 🌻</title>
    <style>
        :root {
            --bg-color: #fef9e7; 
            --stem-color: #43a047;
            --petal-color: #ffeb3b;
            --center-color: #5d4037;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', sans-serif;
            touch-action: manipulation;
        }

        .world {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        /* Contenedor de mensajes ajustado para móvil */
        .message-container {
            position: absolute;
            top: 10%; /* Un poco más arriba para dar espacio a las flores */
            width: 90%;
            max-width: 400px;
            text-align: center;
            z-index: 30;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(254, 249, 231, 0.6); /* Fondo sutil para legibilidad */
            padding: 15px;
            border-radius: 20px;
        }

        .message {
            font-size: 1.5rem; /* Tamaño optimizado para celular */
            color: #d35400;
            font-weight: bold;
            line-height: 1.2;
            margin-bottom: 10px;
            text-shadow: 1px 1px 5px rgba(255,255,255,1);
            transition: opacity 0.5s ease;
        }

        .hint {
            font-size: 0.85rem;
            color: #e67e22;
            font-style: italic;
            line-height: 1.4;
        }

        /* Flores con escala corregida */
        .flower {
            position: absolute;
            bottom: -10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom center;
            animation: sway 4s ease-in-out infinite alternate;
            z-index: 10;
        }

        .stem {
            width: 5px;
            background: linear-gradient(to top, var(--stem-color), #66bb6a);
            border-radius: 10px;
        }

        .head {
            position: relative;
            width: 45px;
            height: 45px;
            margin-bottom: -8px;
        }

        .center {
            position: absolute;
            width: 18px;
            height: 18px;
            background-color: var(--center-color);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        .petals {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: rotateFlower 20s linear infinite;
        }

        .petal {
            position: absolute;
            background: var(--petal-color);
            width: 16px;
            height: 28px;
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%;
            left: 14.5px;
            top: -4px;
            transform-origin: center 28px;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        /* Corazones y pétalos */
        .heart {
            position: absolute;
            font-size: 24px;
            z-index: 100;
            animation: fly 2s ease-out forwards;
        }

        .falling-petal {
            position: absolute;
            background-color: var(--petal-color);
            width: 8px;
            height: 12px;
            border-radius: 50% 0 50% 0;
            opacity: 0.7;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); left: var(--x); }
            100% { transform: translateY(110vh) rotate(360deg); left: var(--x2); }
        }

        @keyframes fly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--mx), -150px) scale(1.5) rotate(20deg); opacity: 0; }
        }

        @keyframes sway {
            from { transform: rotate(-4deg); }
            to { transform: rotate(4deg); }
        }

        @keyframes rotateFlower {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="world" id="world">
        <div class="message-container">
            <div class="message" id="msg">Para la dueña de todo mi corazón 🌻</div>
            <div class="hint" id="hintText">(La pre novia más linda del mundo jajaja te amo ❤️)</div>
        </div>
    </div>

    <audio id="audio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <script>
        const world = document.getElementById('world');
        const audio = document.getElementById('audio');
        const msg = document.getElementById('msg');
        const hint = document.getElementById('hintText');

        document.body.addEventListener('click', (e) => {
            if (audio.paused) {
                audio.play();
                msg.innerText = "Te amo mucho genuinamente 💛";
                
                setTimeout(() => {
                    msg.style.opacity = 0;
                    setTimeout(() => {
                        msg.innerText = "¡Feliz Primavera! ✨";
                        msg.style.opacity = 1;
                    }, 500);
                }, 4000);
            }
            createHeart(e.clientX, e.clientY);
        });

        function createHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = (x - 12) + 'px';
            heart.style.top = (y - 12) + 'px';
            // Movimiento lateral aleatorio para el corazón
            heart.style.setProperty('--mx', (Math.random() * 100 - 50) + 'px');
            world.appendChild(heart);
            setTimeout(() => heart.remove(), 2000);
        }

        function createFlower() {
            const flower = document.createElement('div');
            flower.className = 'flower';
            const xPos = Math.random() * 85 + 7;
            // Altura de tallos reducida para móviles
            const height = window.innerHeight * (0.2 + Math.random() * 0.25); 
            const sizeScale = 0.7 + Math.random() * 0.4;
            const delay = Math.random() * -10;

            flower.style.left = xPos + '%';
            flower.style.animationDelay = delay + 's';
            flower.style.transform = `scale(${sizeScale})`;

            flower.innerHTML = `
                <div class="head">
                    <div class="center"></div>
                    <div class="petals">
                        ${Array(10).fill(0).map((_, i) => `<div class="petal" style="transform: rotate(${i * 36}deg)"></div>`).join('')}
                    </div>
                </div>
                <div class="stem" style="height: ${height}px"></div>
            `;
            world.appendChild(flower);
        }

        function createFallingPetal() {
            const petal = document.createElement('div');
            petal.className = 'falling-petal';
            const xStart = Math.random() * 100;
            const xEnd = xStart + (Math.random() * 20 - 10);
            const duration = 6 + Math.random() * 4;
            petal.style.setProperty('--x', xStart + 'vw');
            petal.style.setProperty('--x2', xEnd + 'vw');
            petal.style.animationDuration = duration + 's';
            world.appendChild(petal);
            setTimeout(() => petal.remove(), duration * 1000);
        }

        // Cantidad de flores adaptada
        const flowerCount = window.innerWidth < 600 ? 6 : 12;
        for(let i = 0; i < flowerCount; i++) {
            createFlower();
        }

        setInterval(createFallingPetal, 400);
    </script>
</body>
</html>
