<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tu Ramo 🌻</title>
    <style>
        :root {
            --bg-color: #fef9e7; 
            --stem-color: #43a047;
            --petal-color: #ffeb3b;
            --center-color: #5d4037;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', sans-serif;
            touch-action: manipulation;
        }

        .world {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Flores crecen desde abajo */
            align-items: center; /* Centramos el ramo */
        }

        /* Contenedor del Ramo Central */
        .bouquet-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60vh; /* Altura máxima del ramo */
            display: flex;
            justify-content: center;
            align-items: flex-end;
            pointer-events: none; /* No interfiere con clics */
            z-index: 10;
        }

        /* Contenedor de mensajes (ajustado para móvil) */
        .message-container {
            position: absolute;
            top: 10%;
            width: 90%;
            max-width: 400px;
            text-align: center;
            z-index: 30;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(254, 249, 231, 0.7);
            padding: 15px;
            border-radius: 20px;
        }

        .message {
            font-size: 1.5rem;
            color: #d35400;
            font-weight: bold;
            line-height: 1.2;
            margin-bottom: 10px;
            text-shadow: 1px 1px 5px rgba(255,255,255,1);
            transition: opacity 0.5s ease;
        }

        .hint {
            font-size: 0.85rem;
            color: #e67e22;
            font-style: italic;
            line-height: 1.4;
        }

        /* Flores con Animación de Crecimiento */
        .flower {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom center;
            /* Crecimiento inicial y luego balanceo */
            animation: grow 2s ease-out forwards, sway 4s ease-in-out infinite alternate 2s;
            opacity: 0; /* Empiezan invisibles */
        }

        .stem {
            width: 5px;
            background: linear-gradient(to top, var(--stem-color), #66bb6a);
            border-radius: 10px;
            /* Animación de crecimiento del tallo */
            height: 0; 
            animation: growStem 2s ease-out forwards;
        }

        .head {
            position: relative;
            width: 45px;
            height: 45px;
            margin-bottom: -8px;
            /* Aparece al final del crecimiento */
            opacity: 0;
            animation: fadeIn 0.5s ease-out forwards 1.8s; 
        }

        .center {
            position: absolute;
            width: 18px;
            height: 18px;
            background-color: var(--center-color);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        .petals {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: rotateFlower 20s linear infinite;
        }

        .petal {
            position: absolute;
            background: var(--petal-color);
            width: 16px;
            height: 28px;
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%;
            left: 14.5px;
            top: -4px;
            transform-origin: center 28px;
        }

        /* Corazones y pétalos cayendo */
        .heart {
            position: absolute;
            font-size: 24px;
            z-index: 100;
            animation: fly 2s ease-out forwards;
        }

        .falling-petal {
            position: absolute;
            background-color: var(--petal-color);
            width: 8px;
            height: 12px;
            border-radius: 50% 0 50% 0;
            opacity: 0.7;
            animation: fall linear infinite;
            z-index: 5;
        }

        /* Animaciones */
        @keyframes grow {
            0% { transform: scale(0.2) translateY(50px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        @keyframes growStem {
            0% { height: 0; }
            100% { height: var(--stem-h); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); left: var(--x); }
            100% { transform: translateY(110vh) rotate(360deg); left: var(--x2); }
        }

        @keyframes fly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--mx), -150px) scale(1.5) rotate(20deg); opacity: 0; }
        }

        @keyframes sway {
            from { transform: rotate(-3deg); }
            to { transform: rotate(3deg); }
        }

        @keyframes rotateFlower {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="world" id="world">
        <div class="message-container">
            <div class="message" id="msg">Para la dueña de todo mi corazón 🌻</div>
            <div class="hint" id="hintText">(La pre novia más linda del mundo jajaja te amo ❤️)</div>
        </div>
        
        <div class="bouquet-container" id="bouquet"></div>
    </div>

    <audio id="audio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <script>
        const world = document.getElementById('world');
        const bouquet = document.getElementById('bouquet');
        const audio = document.getElementById('audio');
        const msg = document.getElementById('msg');
        const hint = document.getElementById('hintText');

        let flowersGrown = false;

        document.body.addEventListener('click', (e) => {
            if (audio.paused) {
                audio.play();
                msg.innerText = "Te amo mucho genuinamente 💛";
                
                // Si es el primer clic, hacemos crecer el ramo
                if (!flowersGrown) {
                    growBouquet();
                    flowersGrown = true;
                }

                setTimeout(() => {
                    msg.style.opacity = 0;
                    setTimeout(() => {
                        msg.innerText = "Contigo me quedo el resto de mi vida ❤️ s✨";
                        msg.style.opacity = 1;
                    }, 500);
                }, 4000);
            }
            createHeart(e.clientX, e.clientY);
        });

        function createHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = (e.clientX - 12) + 'px'; // Usamos e.clientX directamente
            heart.style.top = (e.clientY - 12) + 'px';
            heart.style.setProperty('--mx', (Math.random() * 100 - 50) + 'px');
            world.appendChild(heart);
            setTimeout(() => heart.remove(), 2000);
        }

        // Función corregida para los corazones
        document.body.addEventListener('click', (e) => {
            // ... (resto del código igual)
            createHeart(e.clientX, e.clientY); 
        });

        function createHeart(x, y) { // Recibimos x e y
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = (x - 12) + 'px'; // Usamos los argumentos x e y
            heart.style.top = (y - 12) + 'px';
            heart.style.setProperty('--mx', (Math.random() * 100 - 50) + 'px');
            world.appendChild(heart);
            setTimeout(() => heart.remove(), 2000);
        }

        // Lógica para crear el ramo central
        function growBouquet() {
            // Definimos un ramo de 8 flores centrales
            const flowerData = [
                { x: 50, h: 40, delay: 0 },    // Central alta
                { x: 45, h: 35, delay: 0.2 },  // Izquierda alta
                { x: 55, h: 35, delay: 0.4 },  // Derecha alta
                { x: 40, h: 30, delay: 0.6 },  // Izquierda media
                { x: 60, h: 30, delay: 0.8 },  // Derecha media
                { x: 48, h: 25, delay: 1.0 },  // Central baja
                { x: 42, h: 25, delay: 1.2 },  // Izquierda baja
                { x: 58, h: 25, delay: 1.4 }   // Derecha baja
            ];

            flowerData.forEach(data => {
                createFlower(data.x, data.h, data.delay);
            });
        }

        function createFlower(xPercent, heightPercent, delay) {
            const flower = document.createElement('div');
            flower.className = 'flower';
            
            // Posición horizontal basada en el centro de la pantalla
            flower.style.left = xPercent + '%';
            flower.style.animationDelay = delay + 's'; // Crecimiento secuencial

            // Altura del tallo basada en porcentaje del alto de la pantalla
            const stemHeight = window.innerHeight * (heightPercent / 100);
            flower.style.setProperty('--stem-h', stemHeight + 'px');

            flower.innerHTML = `
                <div class="head">
                    <div class="center"></div>
                    <div class="petals">
                        ${Array(10).fill(0).map((_, i) => `<div class="petal" style="transform: rotate(${i * 36}deg)"></div>`).join('')}
                    </div>
                </div>
                <div class="stem"></div>
            `;
            bouquet.appendChild(flower);
        }

        function createFallingPetal() {
            const petal = document.createElement('div');
            petal.className = 'falling-petal';
            const xStart = Math.random() * 100;
            const xEnd = xStart + (Math.random() * 20 - 10);
            const duration = 6 + Math.random() * 4;
            petal.style.setProperty('--x', xStart + 'vw');
            petal.style.setProperty('--x2', xEnd + 'vw');
            petal.style.animationDuration = duration + 's';
            world.appendChild(petal);
            setTimeout(() => petal.remove(), duration * 1000);
        }

        // Inicializar pétalos cayendo
        setInterval(createFallingPetal, 400);
    </script>
</body>
</html>
